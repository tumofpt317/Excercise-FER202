<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E07 - Cards Columns</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #efefef;
            color: #111;
        }

        .page-wrap {
            width: 88%;
            max-width: 1620px;
            margin: 0 auto;
            padding: 70px 0 56px;
        }

        .page-title {
            font-size: 40px;
            font-weight: 600;
            margin-bottom: 34px;
            line-height: 1.2;
        }

        .custom-row {
            --bs-gutter-x: 32px;
            --bs-gutter-y: 24px;
        }

        .card-item {
            border-radius: 8px;
            overflow: hidden;
            border: 3px solid transparent;
            box-shadow: none;
        }

        .card-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        .card-text {
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 20px;
            padding: 14px 16px;
        }

        .card-blue {
            background: #2272ea;
            border-color: #2272ea;
        }

        .card-yellow {
            background: #f9bf06;
            border-color: #f9bf06;
        }

        .card-red {
            background: #e53246;
            border-color: #e53246;
        }

        .card-blue .card-text,
        .card-red .card-text {
            color: #fff;
        }

        .card-yellow .card-text {
            color: #111;
        }

        @media (max-width: 991.98px) {
            .page-wrap {
                width: 92%;
                padding-top: 40px;
            }

            .page-title {
                font-size: 34px;
                margin-bottom: 24px;
            }

            .card-text {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <h1 class="page-title">Card Columns</h1>

        <div class="row custom-row">
            <div class="col-lg-4 col-md-6">
                <div class="card-item card-blue">
                    <img src="car.png" alt="Car image">
                    <div class="card-text">Some text inside the first card</div>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="card-item card-yellow">
                    <img src="car.png" alt="Car image">
                    <div class="card-text">Some text inside the first card</div>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="card-item card-red">
                    <img src="car.png" alt="Car image">
                    <div class="card-text">Some text inside the first card</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
